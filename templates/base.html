<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Order App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="{{ url_for('index') }}">Foodie Order</a>
            <nav class="nav-links">
                <a href="{{ url_for('index') }}">Menu</a>
                <a href="{{ url_for('cart_page') }}">Cart <span id="cart-count">{{ cart_count if cart_count is defined else 0 }}</span></a>
            </nav>
        </div>
    </header>

    <main class="container content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>© 2026 Foodie Order. Built with Flask, HTML, CSS, and JavaScript.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
